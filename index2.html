<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  /* ===== あなたのWorkerのURL（変える時はここだけ） ===== */
  :root{
    --bg:#f6f3ec; --card:#ffffff; --ink:#3b3b3b; --sub:#a8a29e;
    --navy:#3a4a63; --navy2:#566b88; --green:#3f7d5c; --red:#c2563f; --blue:#4a6fa5;
    --good:#bcd3a8; --over:#ff7a66;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:'Zen Kaku Gothic New',sans-serif;
    display:flex;justify-content:center;min-height:100vh}
  .mincho{font-family:'Shippori Mincho B1',serif}
  .app{width:100%;max-width:440px;position:relative;padding-bottom:110px}
  .tabular{font-variant-numeric:tabular-nums}

  header{padding:32px 24px 12px}
  .title-row{display:flex;align-items:baseline;justify-content:space-between}
  h1{margin:0;font-size:24px;font-weight:700}
  .logo-sub{font-size:11px;letter-spacing:.3em;color:var(--sub);margin-top:2px}
  .mnav{display:flex;align-items:center;gap:4px;font-size:14px}
  .mnav button{background:none;border:none;padding:6px;border-radius:50%;color:var(--ink);cursor:pointer;font-size:16px;line-height:1}
  .mnav button:disabled{opacity:.25}
  .mlabel{font-family:'Shippori Mincho B1',serif;font-weight:700;width:78px;text-align:center}

  section{padding:0 20px}
  .hero{border-radius:24px;padding:24px;color:#fff;box-shadow:0 8px 24px rgba(58,74,99,.25);
    background:linear-gradient(150deg,var(--navy),var(--navy2));animation:rise .5s ease both}
  .hero .row{display:flex;justify-content:space-between;font-size:12px;color:rgba(255,255,255,.7)}
  .hero .mid{display:flex;align-items:flex-end;justify-content:space-between;margin-top:12px}
  .hero .used{font-size:12px;color:rgba(255,255,255,.7)}
  .hero .used-v{font-size:30px;font-weight:700;margin-top:2px}
  .hero .rem{font-size:12px;color:rgba(255,255,255,.7);text-align:right}
  .hero .rem-v{font-size:22px;font-weight:700;margin-top:2px;color:var(--good)}
  .bar{height:8px;border-radius:99px;background:rgba(255,255,255,.2);overflow:hidden;margin-top:16px}
  .bar > i{display:block;height:100%;border-radius:99px;background:var(--good);transition:width .8s ease}
  .bar-cap{display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,.7);margin-top:6px}

  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
  .stat{background:var(--card);border-radius:16px;padding:12px 0;text-align:center}
  .stat .l{font-size:11px;color:var(--sub)}
  .stat .v{font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:15px;margin-top:2px}

  .tabs{display:flex;background:rgba(168,162,158,.25);border-radius:99px;padding:4px;font-size:13px;margin:24px 20px 0}
  .tabs button{flex:1;border:none;background:none;padding:7px 0;border-radius:99px;color:var(--sub);cursor:pointer;font-family:inherit}
  .tabs button.on{background:#fff;font-weight:700;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08)}

  .list{padding:16px 20px 0;display:flex;flex-direction:column;gap:8px}
  .ccard{background:var(--card);border-radius:16px;padding:16px}
  .ccard .top{display:flex;justify-content:space-between;align-items:baseline;font-size:14px}
  .dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:8px;vertical-align:middle}
  .ccard .share{color:var(--sub);font-size:12px;margin-left:6px}
  .cbar{height:6px;border-radius:99px;background:#f0ede6;overflow:hidden;margin-top:8px}
  .cbar > i{display:block;height:100%;border-radius:99px}
  .ccard .note{font-size:11px;margin-top:4px;color:var(--sub)}

  .txrow{background:var(--card);border-radius:16px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
  .txrow .m{font-size:14px;font-weight:700}
  .txrow .s{font-size:11px;color:var(--sub);margin-top:2px}
  .txrow .a{font-family:'Shippori Mincho B1',serif;font-weight:700}
  .del{background:none;border:none;font-size:16px;cursor:pointer;padding:4px 2px 4px 10px;
    opacity:.4;flex-shrink:0;transition:opacity .2s}
  .del:active{opacity:1}

  .donut-wrap{background:var(--card);border-radius:16px;padding:16px;position:relative}
  .donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
  .donut-center .l{font-size:11px;color:var(--sub)}
  .donut-center .v{font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:20px}

  .empty{text-align:center;color:var(--sub);font-size:14px;padding:32px 0}

  .fab{position:fixed;bottom:24px;left:50%;transform:translateX(calc(220px - 50% - 8px));
    width:56px;height:56px;border-radius:50%;background:var(--navy);color:#fff;border:none;
    font-size:28px;cursor:pointer;box-shadow:0 8px 20px rgba(58,74,99,.4);z-index:20;
    display:flex;align-items:center;justify-content:center}
  .fab:active{transform:translateX(calc(220px - 50% - 8px)) scale(.94)}
  @media(max-width:456px){
    .fab{left:auto;right:24px;transform:none}
    .fab:active{transform:scale(.94)}
  }

  /* シート */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:30;display:flex;align-items:flex-end;justify-content:center}
  .sheet{width:100%;max-width:440px;background:var(--bg);border-radius:24px 24px 0 0;padding:24px 24px 32px;animation:slideup .3s ease}
  .sheet h2{margin:0 0 20px;font-size:18px;font-weight:700;font-family:'Shippori Mincho B1',serif;display:flex;justify-content:space-between;align-items:center}
  .sheet .x{background:none;border:none;font-size:20px;color:var(--sub);cursor:pointer}
  .seg{display:flex;background:rgba(168,162,158,.25);border-radius:99px;padding:4px;font-size:14px;margin-bottom:16px}
  .seg button{flex:1;border:none;background:none;padding:8px 0;border-radius:99px;color:var(--sub);cursor:pointer;font-family:inherit}
  .seg button.on{background:#fff;font-weight:700;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08)}
  label.fld{display:block;font-size:12px;color:var(--sub);margin-bottom:4px}
  input,select{width:100%;background:#fff;border:none;border-radius:12px;padding:12px;font-size:14px;font-family:inherit;outline:none;color:var(--ink)}
  input.amount{font-family:'Shippori Mincho B1',serif;font-size:24px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
  .mb{margin-bottom:16px}
  .submit{width:100%;padding:14px;border:none;border-radius:12px;background:var(--navy);color:#fff;font-weight:700;font-size:15px;font-family:inherit;cursor:pointer;margin-top:8px}
  .submit:active{transform:scale(.98)}
  .submit:disabled{opacity:.5}
  .hint{font-size:11px;color:var(--sub);margin:8px 0 12px}

  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:96px;background:var(--navy);color:#fff;
    padding:12px 20px;border-radius:12px;font-size:14px;z-index:50;box-shadow:0 6px 16px rgba(0,0,0,.2);
    opacity:0;transition:opacity .3s;pointer-events:none;max-width:90%}
  .toast.show{opacity:1}
  .toast.err{background:var(--red)}

  .loading{text-align:center;color:var(--sub);font-size:13px;padding:24px}

  /* ===== カテゴリ カスタムセレクト ===== */

  .bill-day{font-size:11px;color:var(--sub);margin-top:2px}

  /* ── 取込記録 ── */
  .ilog-wrap{padding:4px 0 24px}

  .ilog-empty{text-align:center;color:var(--sub);font-size:14px;padding:40px 0}
  .ilog-filter-bar{background:var(--card);border-radius:14px;padding:12px 14px;margin-bottom:12px;

  .ilog-filter-row{display:flex;align-items:center;gap:6px}
  .ilog-filter-input{width:100%;padding:8px 12px;border:1.5px solid #e0dbd3;border-radius:10px;
    font-family:inherit;font-size:13px;background:#fafaf8;color:var(--ink)}
  .ilog-filter-date{flex:1;padding:8px 10px;border:1.5px solid #e0dbd3;border-radius:10px;

  .ilog-filter-clear{background:none;border:none;color:var(--red);font-size:13px;font-family:inherit;
    cursor:pointer;padding:0 4px;white-space:nowrap;flex-shrink:0}
  .ilog-count{font-size:12px;color:var(--sub);margin-bottom:8px;padding-left:2px}
  .ilog-pending{opacity:.7;border-left:3px solid var(--sub)}
  .ilog-badge-pending{display:inline-block;font-size:10px;background:#e8e2d6;color:var(--sub);
    border-radius:6px;padding:1px 6px;margin-left:6px;vertical-align:middle}
  /* 取込記録モーダル */
  .ilog-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;
    align-items:flex-end;justify-content:center}
  .ilog-modal-overlay.open{display:flex}
  .ilog-modal{background:var(--bg);border-radius:24px 24px 0 0;padding:24px 20px 40px;width:100%;max-width:440px}
  .ilog-modal h3{margin:0 0 16px;font-size:17px;color:var(--navy)}
  .ilog-modal input,.ilog-modal textarea{width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:10px;
    font-family:inherit;font-size:14px;background:#fff;color:var(--ink);box-sizing:border-box}
  .ilog-modal textarea{height:72px;resize:none}
  .ilog-modal .fld{margin-bottom:12px}
  .ilog-date-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;margin-bottom:12px}
  .ilog-date-row span{text-align:center;color:var(--sub);font-size:13px}
  .ilog-modal-btns{display:flex;gap:10px;margin-top:4px}
  .ilog-modal-btns button{flex:1;padding:13px;border:none;border-radius:12px;font-family:inherit;
    font-size:15px;font-weight:700;cursor:pointer}
  .ilog-btn-cancel{background:#e8e2d6;color:var(--ink)}
  .ilog-btn-save{background:var(--navy);color:#fff}


  .ilog-toggle-btn{width:100%;background:none;border:none;font-family:inherit;font-size:12px;
    color:var(--navy);cursor:pointer;padding:6px 0 2px;text-align:left;display:flex;align-items:center;gap:4px}
  .ilog-toggle-btn:active{opacity:.6}
  .ilog-tx-list{margin-top:8px;border-top:1px solid #f0ede6;padding-top:8px;display:none}
  .ilog-tx-list.open{display:block}
  .ilog-tx-row{display:flex;justify-content:space-between;align-items:baseline;
    font-size:12px;padding:4px 0;border-bottom:1px solid #f7f5f0;gap:8px}
  .ilog-tx-row:last-child{border-bottom:none}
  .ilog-tx-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--ink)}

  .ilog-tx-amt{font-weight:700;flex-shrink:0;color:var(--red);font-variant-numeric:tabular-nums}

</style>
</head>
<body>
<div class="app" id="app">
  <header>
    <div class="title-row">
      <div>
        <h1 class="mincho">家計簿</h1>
        <div class="logo-sub">LIFE LOG</div>
      </div>
      <div class="mnav">
        <button id="prev">‹</button>
        <span class="mlabel tabular" id="mlabel">----</span>
        <button id="next">›</button>
      </div>
    </div>
  </header>

  <section>
    <div class="payday" id="payday" style="display:none">

      <button id="paydayClose">✕</button>
    </div>
    <div class="hero">
      <div class="row"><span>今月の予算</span><span class="tabular" id="budget">¥0</span></div>
      <div class="mid">
        <div><div class="used">使用額（変動費）</div><div class="used-v mincho tabular" id="used">¥0</div></div>
        <div><div class="rem">残り</div><div class="rem-v mincho tabular" id="remain">¥0</div></div>

    </div>

    <div class="stats">
      <div class="stat"><div class="l">収入</div><div class="v mincho tabular" id="s-income" style="color:var(--green)">¥0</div></div>
      <div class="stat"><div class="l">変動費</div><div class="v mincho tabular" id="s-var" style="color:var(--red)">¥0</div></div>
      <div class="stat"><div class="l">固定費</div><div class="v mincho tabular" id="s-fix" style="color:var(--blue)">¥0</div></div>
    </div>
  </section>

  <div class="tabs">
    <button data-tab="category" class="on">カテゴリ</button>
    <button data-tab="list">取引</button>
    <button data-tab="calendar">📅</button>
    <button data-tab="bills">💳</button>
    <button data-tab="account">口座</button>
    <button data-tab="balance">残高</button>
    <button data-tab="importlog">📥</button>

  <div id="content" class="list">
    <div class="loading"><span class="spin"></span>読み込み中…</div>
  </div>
</div>


<!-- 取込記録モーダル -->
<div class="ilog-modal-overlay" id="ilogOverlay">
  <div class="ilog-modal">
    <h3 id="ilogModalTitle">取込記録を追加</h3>
    <div class="fld"><label class="fld">口座 / サービス名</label>
      <select id="ilogSource"></select>
    </div>
    <div class="ilog-date-row">
      <div><label class="fld">開始日</label>
        <input type="date" id="ilogFrom">
      </div>
      <span>〜</span>
      <div><label class="fld">終了日</label>
        <input type="date" id="ilogTo">
      </div>
    </div>
    <div class="fld"><label class="fld">メモ（任意）</label>
      <textarea id="ilogMemo" placeholder="例: スクショ10枚、PDF取込済み、残り未確認など"></textarea>
    </div>
    <div class="ilog-modal-btns">
      <button class="ilog-btn-cancel" onclick="closeIlogModal()">キャンセル</button>
      <button class="ilog-btn-save" onclick="saveIlogEntry()">保存</button>
    </div>
  </div>
</div>

<button class="fab scan" id="scanFab" title="スクショ/PDFから読込">📷</button>
<button class="fab" id="fab">＋</button>
<input type="file" id="scanInput" accept="image/*,application/pdf" multiple style="display:none" />
<div id="toast" class="toast"></div>


<!-- 支払管理 登録シート -->
<div class="overlay" id="billOverlay" style="display:none">
  <div class="sheet" onclick="event.stopPropagation()">
    <h2 id="billSheetTitle">支払いを登録 <button class="x" id="billClose">✕</button></h2>

      <div><label class="fld">金額（任意）</label><input id="b-amount" type="number" inputmode="numeric" placeholder="0" /></div>

<!-- クレカ支払日 設定シート（口座DBの「支払日」に保存） -->

    <button class="submit" id="cardDaySubmit">保存する</button>

<!-- 今月の予算 編集シート（月ページの「予算」に保存） -->
<div class="overlay" id="budgetOverlay" style="display:none">

    <label class="fld">予算（円）</label>
    <input class="amount mb" id="bg-amount" type="number" inputmode="numeric" placeholder="0" />

    <button class="submit" id="budgetSubmit">保存する</button>

</div>

<!-- 読み込み結果の確認・編集シート -->
<div class="overlay" id="reviewOverlay" style="display:none">
  <div class="sheet review" onclick="event.stopPropagation()">
    <h2>読み込み結果の確認 <button class="x" id="reviewClose">✕</button></h2>
    <div class="review-head" id="reviewHead"></div>
    <div class="bulk-acc" id="bulkAccWrap" style="display:none">

      <select id="bulkAcc"></select>
    </div>
    <div class="review-scroll" id="reviewList"></div>
    <div class="review-foot">
      <button class="submit" id="reviewSubmit">選択した取引を追加</button>
    </div>
  </div>
</div>

<!-- 入力シート -->
<div class="overlay" id="overlay" style="display:none">
  <div class="sheet" onclick="event.stopPropagation()">

    <button class="submit" id="submitBtn">追加する</button>
  </div>
</div>

<script>
// ============================================================
//  設定：あなたのWorkerのURL
// ============================================================
const API = "https://dry-shadow-b5c5.fituni19taniguchi.workers.dev";

// ---- 状態 ----
// 今日の日付が属する「会計月」(26日始まり)を返す
function currentFiscalMonth(){
  const now = new Date();
  let y = now.getFullYear(), m = now.getMonth()+1, d = now.getDate();
  if(d >= 26){ m += 1; if(m > 12){ m = 1; y += 1; } }
  return y + "-" + String(m).padStart(2,"0");
}

let state = {
  month: currentFiscalMonth(),  // 26日締めの当月から開始
  tab: "category",
  options: { categories: [], accounts: [] },
  summary: null,
};
const CAT_COLORS = ["#c2563f","#cc8b3c","#4a6fa5","#6a5a8c","#3f7d5c","#b05a9c","#5a9c6a","#b8843f","#7a6a9c","#4a9c8c"];
let donutChart = null;

const yen = n => "¥" + Math.round(n).toLocaleString("ja-JP");
const $ = id => document.getElementById(id);

function toast(msg, isErr){
  const t = $("toast");
  t.textContent = msg;
  t.className = "toast show" + (isErr ? " err" : "");
  setTimeout(()=>{ t.className = "toast" + (isErr ? " err":""); }, 2600);
}

// ---- ローカルで集計を再計算（Notionの確定を待たず即反映するため）----
// 支出の合計（予算消化）に含めないカテゴリ：調節費用・立て替え
function isExcludedCategory(category){
  return category === "調節費用" || category === "立て替え";
}
// NMD（ノーマネーデー：お金を使わない目標の日）の判定。カテゴリ名・収支種類どちらも "NMD"
function isNMDCategory(category, kind){
  const n = (category||"").replace(/\s/g,"");
  const k = (kind||"").replace(/\s/g,"");
  return n === "NMD" || k.includes("NMD");
}
function classifyLocal(kind, category){
  // 調節費用・立て替え・NMD は支出に含めない
  if(isExcludedCategory(category) || isNMDCategory(category, kind)) return "ignore";
  const k = (kind||"").replace(/\s/g,"");
  if(k.includes("固定費")) return "fixed";
  if(k.includes("収入")) return "income";
  if(k.includes("支出")) return "variable";
  return "ignore";
}
function recomputeSummary(){
  const s = state.summary;
  if(!s) return;
  let income=0, variableExpense=0, fixedExpense=0;
  const byCategory={}, byAccount={};
  // カテゴリ名→kind の対応（options から）
  const kindOf = {};
  state.options.categories.forEach(c=> kindOf[c.name] = c.kind);
  for(const t of s.transactions){
    const kind = t.kind || kindOf[t.category] || "";
    const bucket = classifyLocal(kind, t.category);
    if(bucket==="income") income += t.amount;
    else if(bucket==="fixed") fixedExpense += t.amount;
    else if(bucket==="variable") variableExpense += t.amount;
    if(t.category && (bucket==="variable"||bucket==="fixed")){
      if(!byCategory[t.category]) byCategory[t.category] = { amount:0, kind };
      byCategory[t.category].amount += t.amount;
    }
    if(t.account){
      byAccount[t.account] = byAccount[t.account] || { out:0, in:0 };
      if(bucket==="income") byAccount[t.account].in += t.amount;
      else byAccount[t.account].out += t.amount;
    }
  }
  s.income = income;
  s.variableExpense = variableExpense;
  s.fixedExpense = fixedExpense;
  s.balance = income - variableExpense - fixedExpense;
  s.budgetUsedPct = s.budget>0 ? (variableExpense/s.budget)*100 : 0;
  s.budgetRemaining = s.budget - variableExpense;
  renderHero();
  renderTab();
}

function shiftMonth(dir){
  const [y,m] = state.month.split("-").map(Number);
  const d = new Date(y, m-1+dir, 1);
  state.month = d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0");
  loadSummary();
}

// ---- 起動：カテゴリ・口座を取得 ----
async function loadOptions(){
  try{
    const r = await fetch(API + "/options");
    const d = await r.json();
    if(!d.ok) throw new Error(d.error || "options error");
    state.options = d;
    buildSelects();
  }catch(e){ toast("一覧の取得に失敗: " + e.message, true); }
}

// ---- 集計を取得 ----
async function loadSummary(){
  $("mlabel").textContent = state.month;
  $("content").innerHTML = '<div class="loading"><span class="spin"></span>読み込み中…</div>';
  try{
    const r = await fetch(API + "/summary?month=" + state.month + "&t=" + Date.now());
    const d = await r.json();
    if(!d.ok) throw new Error(d.error || "summary error");
    state.summary = d;
    renderHero();
    renderTab();
  }catch(e){
    $("content").innerHTML = '<div class="empty">読み込みに失敗しました<br>'+e.message+'</div>';
    toast("集計の取得に失敗: " + e.message, true);
  }
}

function renderHero(){
  const s = state.summary;
  $("budget").innerHTML = yen(s.budget) + ' <span style="opacity:.55;font-size:11px">✎</span>';
  $("used").textContent = yen(s.variableExpense);
  $("remain").textContent = yen(s.budgetRemaining);
  $("remain").style.color = s.budgetRemaining < 0 ? "var(--over)" : "var(--good)";
  const pct = Math.min(100, Math.max(0, s.budgetUsedPct));
  $("barfill").style.width = pct + "%";
  $("barfill").style.background = s.budgetUsedPct >= 100 ? "var(--over)" : "var(--good)";
  $("usedpct").textContent = s.budgetUsedPct.toFixed(1) + "% 使用";
  $("rempct").textContent = Math.max(0, 100 - s.budgetUsedPct).toFixed(1) + "% 残り";
  $("s-income").textContent = yen(s.income);
  $("s-var").textContent = yen(s.variableExpense);
  $("s-fix").textContent = yen(s.fixedExpense);
}

function renderTab(){
  const s = state.summary, c = $("content");
  if(donutChart){ donutChart.destroy(); donutChart = null; }

  if(state.tab === "category"){
    const entries = Object.entries(s.byCategory)
      .map(([name,v]) => ({name, ...v}))
      .sort((a,b)=>b.amount-a.amount);
    const total = entries.reduce((sum,e)=>sum+e.amount,0);
    if(!entries.length){ c.innerHTML = '<div class="empty">この月の支出はありません</div>'; return; }

    let html = '<div class="donut-wrap"><canvas id="donut" height="200"></canvas>'
      + '<div class="donut-center"><div class="l">支出合計</div><div class="v tabular">'+yen(total)+'</div></div></div>';
    entries.forEach((e,i)=>{
      const color = CAT_COLORS[i % CAT_COLORS.length];
      const share = total>0 ? (e.amount/total*100) : 0;
      html += '<div class="ccard"><div class="top"><span><span class="dot" style="background:'+color+'"></span>'
        + e.name + '</span><span class="tabular"><b>'+yen(e.amount)+'</b><span class="share">'+share.toFixed(1)+'%</span></span></div>'
        + '<div class="cbar"><i style="width:'+share+'%;background:'+color+'"></i></div></div>';
    });
    c.innerHTML = html;

    const ctx = $("donut").getContext("2d");
    donutChart = new Chart(ctx, {
      type:"doughnut",
      data:{ labels: entries.map(e=>e.name),
        datasets:[{ data: entries.map(e=>e.amount),
          backgroundColor: entries.map((_,i)=>CAT_COLORS[i%CAT_COLORS.length]), borderWidth:0 }] },
      options:{ cutout:"68%", plugins:{legend:{display:false},tooltip:{enabled:true}}, responsive:true, maintainAspectRatio:false }
    });
  }

  else if(state.tab === "list"){
    if(!s.transactions.length){ c.innerHTML = '<div class="empty">この月の取引はありません</div>'; return; }
    c.innerHTML = s.transactions.map((t,i)=>{
      const inc = (t.kind||"").includes("収入");
      const nmd = isNMDCategory(t.category, t.kind);
      const amtCell = nmd
        ? '<div class="a" data-i="'+i+'" style="color:var(--green);font-size:13px">🎯 NMD</div>'
        : '<div class="a" data-i="'+i+'" style="color:'+(inc?"var(--green)":"var(--ink)")+'">'+(inc?"+":"−")+yen(t.amount)+'</div>';
      return '<div class="txrow"><div class="txmain" data-i="'+i+'" style="flex:1;min-width:0">'
        + '<div class="m">'+(t.memo || t.category || "（無題）")+'</div>'
        + '<div class="s">'+ (t.date? t.date.slice(5,10):"") +' · '+(t.category||"")+(t.subcategory?' ＞ '+t.subcategory:'')+' · '+(t.kind||"").replace(/\s/g,"")+'</div></div>'
        + amtCell
        + '<button class="del" data-id="'+t.id+'" data-label="'+(t.category||"")+' '+yen(t.amount)+'">🗑</button></div>';
    }).join("");
    // 行（金額・内容部分）タップで編集シートを開く
    c.querySelectorAll(".txmain, .a").forEach(el=>{
      el.onclick = ()=> openEditSheet(s.transactions[el.dataset.i]);
    });
    c.querySelectorAll(".del").forEach(b=>{
      b.onclick = (e)=>{ e.stopPropagation(); deleteTx(b.dataset.id, b.dataset.label); };
    });
  }

  else if(state.tab === "account"){
    const entries = Object.entries(s.byAccount);
    if(!entries.length){ c.innerHTML = '<div class="empty">この月の口座データはありません</div>'; return; }
    c.innerHTML = entries.map(([name,v])=>
      '<div class="txrow"><div class="m">'+name+'</div><div style="text-align:right" class="tabular">'
      + '<div style="color:var(--red);font-size:14px">支出 '+yen(v.out)+'</div>'
      + (v.in>0 ? '<div style="color:var(--green);font-size:11px">収入 '+yen(v.in)+'</div>' : '')
      + '</div></div>').join("");
  }

  else if(state.tab === "balance"){
    renderBalances(c);
  }
  else if(state.tab === "importlog"){
    renderImportLog();
    return;
  }
  else if(state.tab === "calendar"){
    renderCalendar(c);
  }
  else if(state.tab === "bills"){
    renderBills(c);
  }
}

// 口座残高（全期間・タイプ別にグループ表示）
async function renderBalances(c){
  c.innerHTML = '<div class="loading"><span class="spin"></span>残高を計算中…</div>';
  try{
    const r = await fetch(API + "/balances?t=" + Date.now());
    const d = await r.json();
    if(!d.ok) throw new Error(d.error || "balances error");
    const typeOf = {}; state.options.accounts.forEach(a=> typeOf[a.name]=a.type||"その他");
    // タイプ別にまとめる
    const groups = {};
    Object.entries(d.balances).forEach(([name,v])=>{
      const t = v.type || typeOf[name] || "その他";
      (groups[t]=groups[t]||[]).push({name, balance:v.balance});
    });
    const order = [...TYPE_ORDER.filter(t=>groups[t]), ...Object.keys(groups).filter(t=>!TYPE_ORDER.includes(t))];
    let html = "";
    order.forEach(t=>{
      const sum = groups[t].reduce((a,b)=>a+b.balance,0);
      html += '<div style="margin:8px 4px 4px;font-size:12px;color:var(--sub);display:flex;justify-content:space-between">'
        + '<span>'+t+'</span><span class="tabular">'+yen(sum)+'</span></div>';
      groups[t].sort((a,b)=>b.balance-a.balance).forEach(a=>{
        const neg = a.balance < 0;
        html += '<div class="txrow"><div class="m">'+a.name+'</div>'
          + '<div class="a tabular" style="color:'+(neg?"var(--red)":"var(--ink)")+'">'+yen(a.balance)+'</div></div>';
      });
    });
    c.innerHTML = html || '<div class="empty">口座がありません</div>';
  }catch(e){
    c.innerHTML = '<div class="empty">残高の取得に失敗しました<br>'+e.message+'</div>';
  }
}

// 口座を分類（タイプ）ごとにグループ化した <optgroup> を作る
// カテゴリの表示順（似た項目を隣に）。ここに無い名前は末尾へ。
const CATEGORY_ORDER = [
  "美容品","美容施術","衣服","日用雑貨",
  "食費","交際費","エンタメ","サブスク",
  "教育・教養","交通","医療・保険",
  "固定費","税金","特別費","調節費用","立て替え","NMD"
];
function catRank(name){
  const i = CATEGORY_ORDER.indexOf(name);
  return i === -1 ? 999 : i;
}
function sortCats(cats){
  return cats.slice().sort((a,b)=>{
    const r = catRank(a.name) - catRank(b.name);
    return r !== 0 ? r : a.name.localeCompare(b.name, "ja");
  });
}

const TYPE_ORDER = ["銀行","カード系列","証券口座","電子決済","現金","非通常用途","その他"];
function accountOptionsHTML(){
  const accs = state.options.accounts; // [{name, type}]
  const groups = {};
  accs.forEach(a=>{ const t=a.type||"その他"; (groups[t]=groups[t]||[]).push(a.name); });
  const order = [...TYPE_ORDER.filter(t=>groups[t]), ...Object.keys(groups).filter(t=>!TYPE_ORDER.includes(t))];
  // 先頭に「選択なし」（未設定）を入れる
  let html = '<option value="">（選択なし）</option>';
  html += order.map(t=>
    '<optgroup label="'+t+'">' + groups[t].map(n=>'<option>'+n+'</option>').join("") + '</optgroup>'
  ).join("");
  return html;
}
function buildSelects(){
  const type = document.querySelector("#typeSeg .on").dataset.type;
  const html = accountOptionsHTML();
  $("f-accountOut").innerHTML = html;
  $("f-accountIn").innerHTML = html;
  refreshCategorySelect(type);
  applyTypeUI(type);
}
// ---- カテゴリ カラー設定 ----
const CAT_COLOR_MAP = {
  "食費":"#e07b54","日用雑貨":"#e07b54","美容品":"#e07b54","美容施術":"#e07b54","衣服":"#e07b54",
  "交際費":"#4a6fa5","エンタメ":"#4a6fa5","サブスク":"#4a6fa5",
  "教育・教養":"#3f7d5c","交通":"#3f7d5c",
  "医療・保険":"#6a5a8c","固定費":"#6a5a8c",
  "税金":"#8c6a4a","特別費":"#8c6a4a","調節費用":"#8c6a4a",
  "立て替え":"#7a8c8c","NMD":"#5a9c6a",
};
const CAT_GROUPS_DEF = [
  { label:"日常生活",      cats:["食費","日用雑貨","美容品","美容施術","衣服"],  color:"#e07b54" },
  { label:"交流・楽しみ",  cats:["交際費","エンタメ","サブスク"],               color:"#4a6fa5" },
  { label:"自己投資・移動",cats:["教育・教養","交通"],                           color:"#3f7d5c" },
  { label:"医療・保険・固定",cats:["医療・保険","固定費"],                       color:"#6a5a8c" },
  { label:"税金・特別・その他",cats:["税金","特別費","調節費用"],                color:"#8c6a4a" },
  { label:"立替・ノーマネー",cats:["立て替え","NMD"],                            color:"#5a9c6a" },
];
function catColor(name){ return CAT_COLOR_MAP[name] || "#888"; }

function updateCatDot(val){
  const dot = document.getElementById("catDot");
  if(dot) dot.style.background = val ? catColor(val) : "transparent";
}

function groupedCategoryOptionsHTML(cats, selectedValue){
  const catSet = new Set(cats.map(c=>c.name));
  let html = '<option value=""'+(selectedValue?'':' selected')+'>（選択してください）</option>';
  const grouped = new Set(CAT_GROUPS_DEF.flatMap(g=>g.cats));
  CAT_GROUPS_DEF.forEach(group=>{
    const available = group.cats.filter(c=>catSet.has(c));
    if(!available.length) return;
    html += '<optgroup label="── '+group.label+' ──">';
    available.forEach(name=>{
      html += '<option'+(name===selectedValue?' selected':'')+'>'+name+'</option>';
    });
    html += '</optgroup>';
  });
  // ungrouped fallback
  const others = cats.filter(c=>!grouped.has(c.name));
  if(others.length){
    html += '<optgroup label="── その他 ──">';
    others.forEach(c=>{
      html += '<option'+(c.name===selectedValue?' selected':'')+'>'+c.name+'</option>';
    });
    html += '</optgroup>';
  }
  return html;
}

function refreshCategorySelect(type){
  const catSel = $("f-category");
  // 収入なら収入カテゴリ、支出なら支出系（移動は対象外）。立て替え・NMDは種別を問わず支出タブで選べる
  const cats = state.options.categories.filter(c=>{
    const k = (c.kind||"").replace(/\s/g,"");
    if(type==="income") return k.includes("収入");
    if(type==="move") return false;
    if(c.name==="立て替え" || isNMDCategory(c.name, c.kind)) return true;
    return k.includes("支出") || k.includes("固定費");
  });
  const sorted = sortCats(cats);
  catSel.innerHTML = groupedCategoryOptionsHTML(sorted, catSel.value);
  updateCatDot(catSel.value);
  refreshSubSelect(catSel.value);
}
// サブカテゴリ（親に応じて中身を出す。無ければ欄を隠す）
function subListOf(category){
  return (state.options.subcats && state.options.subcats[category]) || [];
}
function subOptionsHTML(category, selected){
  const subs = subListOf(category);
  let html = '<option value="">（指定なし）</option>';
  html += subs.map(s=>'<option'+(s===selected?' selected':'')+'>'+s+'</option>').join("");
  return html;
}
function refreshSubSelect(category, selected){
  const subs = subListOf(category);
  const wrap = $("subWrap"), sel = $("f-subcategory");
  if(!subs.length){ wrap.style.display = "none"; sel.innerHTML = '<option value=""></option>'; return; }
  wrap.style.display = "block";
  sel.innerHTML = subOptionsHTML(category, selected);
}
// モードに応じて表示するフィールドを切り替える
function applyTypeUI(type){
  const isMove = type==="move";
  $("catWrap").style.display = isMove ? "none" : "block";
  $("accInWrap").style.display = isMove ? "block" : "none";
  if(type==="income"){
    $("accOutLabel").textContent = "口座（入金先）";
  }else if(isMove){
    $("accOutLabel").textContent = "口座（出金元）";
    $("accInLabel").textContent  = "口座（入金先）";
  }else{
    $("accOutLabel").textContent = "口座（出金元）";
  }
}

// ---- 追加 / 編集（共通） ----
let editingId = null;  // null=追加モード, 値あり=編集モード

async function submitTx(){
  const type = document.querySelector("#typeSeg .on").dataset.type; // expense/income/move
  let amount = parseInt($("f-amount").value,10);
  const date = $("f-date").value;
  const memo = $("f-memo").value;
  // NMD（ノーマネーデー）は0円で登録OK。それ以外は金額必須
  const selCatName = (type==="move") ? "" : $("f-category").value;
  const isNMD = isNMDCategory(selCatName);
  if(isNMD){
    if(isNaN(amount) || amount<0) amount = 0;
  }else{
    if(!amount || amount<=0){ toast("金額を入力してください", true); return; }
  }
  if(!date){ toast("日付を選んでください", true); return; }

  // モード別に、カテゴリ・出金先・入金先を決める
  let category, accountOut=null, accountIn=null;
  if(type==="move"){
    accountOut = $("f-accountOut").value;
    accountIn  = $("f-accountIn").value;
    if(!accountOut || !accountIn){ toast("出金元と入金先を選んでください", true); return; }
    if(accountOut === accountIn){ toast("出金元と入金先が同じです", true); return; }
    // 移動用カテゴリを自動選択（「お金移動」を優先、無ければ移動種別の先頭）
    const moveCat = state.options.categories.find(c=>c.name==="お金移動")
                 || state.options.categories.find(c=>(c.kind||"").replace(/\s/g,"").includes("移動"));
    if(!moveCat){ toast("移動用カテゴリ（お金移動）が見つかりません", true); return; }
    category = moveCat.name;
  }else{
    category = $("f-category").value;
    if(!category){ toast("カテゴリを選んでください", true); return; }
    if(type==="income"){ accountIn = $("f-accountOut").value; }  // 収入は「口座（入金先）」をf-accountOutに表示
    else { accountOut = $("f-accountOut").value; }
  }
  // サブカテゴリ（親に属する有効な値のときだけ採用）
  let subcategory = (type==="move") ? "" : $("f-subcategory").value;
  if(subcategory && !subListOf(category).includes(subcategory)) subcategory = "";

  const isEdit = !!editingId;
  const kindOf = {}; state.options.categories.forEach(c=> kindOf[c.name]=c.kind);
  const kind = kindOf[category] || "";
  const txMonth = fiscalMonthOf(date);
  const editId = editingId;
  const accountForView = accountOut || accountIn || "";

  // --- 画面を即反映（楽観的更新）---
  closeSheet();
  if(txMonth === state.month){
    const s = state.summary;
    if(s){
      const row = { id: isEdit?editId:("temp-"+Date.now()), date, amount, category, subcategory, kind, account: accountForView, memo };
      if(!isEdit) row._pending = true;
      if(isEdit){
        const idx = s.transactions.findIndex(t=>t.id===editId);
        if(idx>=0) s.transactions[idx] = row;
      }else{
        s.transactions.push(row);
      }
      s.transactions.sort((a,b)=> (b.date||"").localeCompare(a.date||""));
      recomputeSummary();
    }
  }
  toast(isEdit ? "更新中…" : "追加中…");

  // --- 裏でNotionに保存 ---
  try{
    const body = { date, amount, category, memo, subcategory };
    if(accountOut) body.accountOut = accountOut;
    if(accountIn)  body.accountIn  = accountIn;
    if(isEdit) body.id = editId;
    const r = await fetch(API + (isEdit ? "/update" : "/add"), {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify(body)
    });
    const d = await r.json();
    if(!d.ok) throw new Error(d.error || "error");
    toast(isEdit ? "更新しました" : "追加しました");
    if(!isEdit && d.month !== state.month){
      state.month = d.month; await loadSummary();
    }else{
      if(!isEdit && state.summary){
        const tmp = state.summary.transactions.find(t=>t._pending);
        if(tmp){ tmp.id = d.id; delete tmp._pending; }
      }
    }
  }catch(e){
    toast((isEdit?"更新":"追加")+"に失敗しました。再読み込みします", true);
    await loadSummary();
  }
}

//  スクショ/PDF 読み込み → 確認・編集 → 一括追加
// ============================================================
let scanRows = [];   // 解析結果（編集対象）

// 重複判定キー：日付|金額|名前（全角半角・空白・区切り記号の揺れを吸収）
function normKey(s){
  return (s||"")
    // 全角の英数字・記号（！〜～）を半角へ寄せる（例：Ｐａｓａｒ→pasar、ＪＲ→jr）
    .replace(/[\uFF01-\uFF5E]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0))
    .toLowerCase()
    // 空白・中黒・各種ダッシュ・記号類を除去（AIの表記ゆれを吸収）
    .replace(/[\s\u3000・･.,\u2010-\u2015\u2212ー－—\-_/|&'"’`()（）]/g, "");
}
function dupKey(date, amount, name){
  return (date||"").slice(0,10) + "|" + Math.abs(Math.round(Number(amount)||0)) + "|" + normKey(name);
}

// 既存取引のキー集合を、対象の会計月ぶんだけ集める
async function existingKeySet(rows){
  const months = [...new Set(rows.map(r=>fiscalMonthOf(r.date)).filter(Boolean))];
  const set = new Set();
  for(const m of months){
    let txs = [];
    if(state.summary && state.summary.month === m && state.summary.transactions){
      txs = state.summary.transactions;
    }else{
      try{
        const r = await fetch(API + "/summary?month=" + m + "&t=" + Date.now());
        const d = await r.json();
        txs = d.ok ? (d.transactions||[]) : [];
      }catch(e){ txs = []; }
    }
    for(const t of txs) set.add(dupKey(t.date, t.amount, t.memo || t.category));
  }
  return set;
}

// ファイルを base64 に変換（data URL の先頭を外す）
function fileToBase64(file){
  return new Promise((res, rej)=>{
    const r = new FileReader();
    r.onload = ()=>{ const s = String(r.result); res({ media_type:file.type || "image/jpeg", data: s.slice(s.indexOf(",")+1) }); };
    r.onerror = ()=> rej(new Error("ファイル読込に失敗"));
    r.readAsDataURL(file);
  });
}

// 全カテゴリの <option>（似た項目順のフラット表示）
function allCategoryOptionsHTML(selected){
  const cats = state.options.categories || [];
  // 収入・移動・調節は通常レシートでは使わないので末尾へ寄せる
  const isLate = c => /収入|移動|調節/.test((c.kind||"")+c.name);
  const main = sortCats(cats.filter(c=>!isLate(c)));
  const late = sortCats(cats.filter(isLate));
  const opt = c => '<option'+(c.name===selected?' selected':'')+'>'+c.name+'</option>';
  let html = '<option value=""'+(selected?'':' selected')+'>（未分類）</option>';
  html += main.map(opt).join("");
  if(late.length) html += '<option disabled>──────</option>' + late.map(opt).join("");
  return html;
}
function kindOfCat(name){
  const c = (state.options.categories||[]).find(x=>x.name===name);
  return c ? c.kind : "";
}

// スキャン開始（ファイル選択 → 解析）
async function startScan(files){
  if(!files || !files.length) return;
  $("reviewOverlay").style.display = "flex";
  $("reviewHead").textContent = "";
  $("bulkAccWrap").style.display = "none";
  $("reviewList").innerHTML = '<div class="scanload"><span class="spin"></span>画像を解析中…（数秒〜十数秒）</div>';
  $("reviewSubmit").disabled = true;
  bindReviewClose();
  try{
    const encoded = [];
    for(const f of files) encoded.push(await fileToBase64(f));
    const r = await fetch(API + "/parse", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        files: encoded,
        today: new Date().toISOString().slice(0,10),
        hint: [
          "【仕訳・分類ルール】",
          "1. 店名や品名から用途が推測できる場合は、漏れなくその情報を考慮して分類してください。",
          "2. 「〇〇への送金」といった送金系のデータは、一律「交際費（食事）」として処理してください。"
        ].join("\n")
      })
    });
    const d = await r.json();
    if(!d.ok) throw new Error(d.error || "parse error");
    const rows = (d.transactions || []).map(t=>{
      const category = t.category || "";
      let sub = t.subcategory || "";
      if(sub && !subListOf(category).includes(sub)) sub = "";
      return {
        date: (t.date||"").slice(0,10),
        amount: Math.abs(Math.round(Number(t.amount)||0)),
        name: t.name || "",
        category,
        subcategory: sub,
        kind: t.kind || kindOfCat(category),
        account: "",
      };
    });
    if(!rows.length){
      // 取引0件でも「読み込みを試みた」記録は残す
      autoAddIlogFromScan([], files);
      $("reviewList").innerHTML = '<div class="empty">取引を読み取れませんでした</div>';
      return;
    }

    // 重複判定（既存取引 + バッチ内の重複）
    const exist = await existingKeySet(rows);
    const seen = new Set();
    rows.forEach(row=>{
      const key = dupKey(row.date, row.amount, row.name);
      const isDup = exist.has(key) || seen.has(key);
      seen.add(key);
      row._dup = isDup;
      row._on = !isDup;   // 重複は既定でオフ
    });
    scanRows = rows;

    // AI解析結果から取込記録を自動生成
    autoAddIlogFromScan(rows, files);

    renderReview();
  }catch(e){
    $("reviewList").innerHTML = '<div class="empty">読み込みに失敗しました<br>'+e.message+'</div>';
    toast("読み込み失敗: " + e.message, true);
  }
}

  });

  L.querySelectorAll(".rdate").forEach(el=> el.onchange = ()=>{ scanRows[el.dataset.i].date = el.value; });
  L.querySelectorAll(".ramount").forEach(el=> el.oninput = ()=>{ scanRows[el.dataset.i].amount = Math.abs(parseInt(el.value,10)||0); });

  });

  L.querySelectorAll(".racc").forEach(el=> el.onchange = ()=>{ scanRows[el.dataset.i].account = el.value; });

  $("bulkAcc").onchange = ()=>{

    scanRows.forEach(r=> r.account = v);
    $("reviewList").querySelectorAll(".racc").forEach(sel=> selectAccountValue(sel, v));
  };

  $("reviewSubmit").disabled = false;
  $("reviewSubmit").textContent = "選択した取引を追加";
}

// 選択された行を1件ずつ /add へ
async function submitScan(){
  const targets = scanRows.filter(r=>r._on);
  if(!targets.length){ toast("追加する取引が選ばれていません", true); return; }
  for(const r of targets){
    if(!r.amount || r.amount<=0){ toast("金額が未入力の行があります", true); return; }
    if(!r.date){ toast("日付が未入力の行があります", true); return; }
    if(!r.category){ toast("カテゴリ未選択の行があります", true); return; }
  }
  const btn = $("reviewSubmit");
  btn.disabled = true;
  let ok = 0, ng = 0;
  for(let i=0;i<targets.length;i++){
    const r = targets[i];
    btn.textContent = "追加中… ("+(i+1)+"/"+targets.length+")";
    try{
      const body = { date:r.date, amount:r.amount, category:r.category, memo:r.name };
      if(r.account) body.account = r.account;
      if(r.subcategory) body.subcategory = r.subcategory;
      const resp = await fetch(API + "/add", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify(body)
      });
      const d = await resp.json();
      if(!d.ok) throw new Error(d.error||"error");
      ok++;
    }catch(e){ ng++; }
  }
  $("reviewOverlay").style.display = "none";
  finalizeIlogFromScan(targets);
  scanRows = [];
  toast(ng ? (ok+"件追加・"+ng+"件失敗") : (ok+"件を追加しました"), ng>0);
  await loadSummary();
}

// ── 取込記録 ──
let ilogEditId = null;
let ilogFilter = { source: '', dateFrom: '', dateTo: '' };

// ── 取込記録は Notion（DB_IMPORTLOG）に保存。メモリにキャッシュして表示 ──
let ilogCache = null;       // null = 未ロード
let ilogLoadError = '';
let lastScanFileCount = 0;  // 直近スキャンのファイル数（メモ用）

function getIlogEntries(){ return ilogCache || []; }

async function loadIlog(force){
  if(ilogCache && !force) return ilogCache;
  await migrateIlogOnce();
  try{
    const r = await fetch(API + "/importlog?t=" + Date.now());
    const d = await r.json();
    if(!d.ok) throw new Error(d.error||'error');
    ilogCache = d.entries || [];
    ilogLoadError = '';
  }catch(e){
    ilogCache = ilogCache || [];
    ilogLoadError = e.message || String(e);
  }
  return ilogCache;
}

// 旧localStorageの記録を一度だけNotionへ移行（非破壊・フラグでガード）
async function migrateIlogOnce(){
  if(localStorage.getItem('moneylog_ilog_migrated')) return;
  let old = [];
  try{ old = JSON.parse(localStorage.getItem('moneylog_importlog')||'[]'); }catch(e){ old = []; }
  if(!old.length){ localStorage.setItem('moneylog_ilog_migrated','1'); return; }
  let okCount = 0;
  for(const e of old){
    try{
      const r = await fetch(API + "/importlog/add", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          source: e.source || '（口座未選択）',
          from: e.from || '', to: e.to || '',
          memo: e.memo || '', savedAt: e.savedAt || '',
          txSnapshot: e.txSnapshot || []
        })
      });
      const d = await r.json();
      if(d.ok) okCount++;
    }catch(_){}
  }
  // 1件でも成功したら移行済みに（DB_IMPORTLOG未設定で全滅した場合は次回再試行）
  if(okCount > 0) localStorage.setItem('moneylog_ilog_migrated','1');
}

// スキャン時はファイル数だけ覚えておく（記録は取込確定時にNotionへ作成）
function autoAddIlogFromScan(rows, files){
  lastScanFileCount = (files && files.length) ? files.length : 0;
}

// submitScan完了後、実際に取り込んだ取引でNotionに記録を作成
async function finalizeIlogFromScan(targets){
  if(!targets || !targets.length) return;
  const accounts = [...new Set(targets.map(r=>r.account).filter(Boolean))];
  const source = accounts.length ? accounts.join('・') : '（口座未選択）';
  const ds = targets.map(r=>r.date).filter(Boolean).sort();
  const entry = {
    source,
    from: ds[0] || '',
    to: ds[ds.length-1] || '',
    memo: lastScanFileCount ? (lastScanFileCount + 'ファイル読込') : '',
    savedAt: new Date().toISOString(),
    txSnapshot: targets.map(r=>({ date:r.date, name:r.name, amount:r.amount, category:r.category }))
  };
  try{
    const r = await fetch(API + "/importlog/add", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify(entry)
    });
    const d = await r.json();
    if(!d.ok) throw new Error(d.error||'error');
  }catch(e){ toast("取込記録の保存に失敗: " + e.message, true); }
  await loadIlog(true);
  if(state.tab === 'importlog') renderImportLog();
}



async function renderImportLog(){
  const c = $('content');
  if(ilogCache === null){
    c.innerHTML = '<div class="ilog-wrap"><div class="ilog-empty">読み込み中…</div></div>';
    await loadIlog();
  }
  const allEntries = getIlogEntries().slice().reverse();

  const filtered = allEntries.filter(e => {
    if(ilogFilter.source && !(e.source||'').includes(ilogFilter.source)) return false;
    if(ilogFilter.dateFrom && e.to && e.to < ilogFilter.dateFrom) return false;
    if(ilogFilter.dateTo && e.from && e.from > ilogFilter.dateTo) return false;
    return true;
  });

  const filterActive = ilogFilter.source || ilogFilter.dateFrom || ilogFilter.dateTo;
  let html = '<div class="ilog-wrap">';
  html += '<button class="ilog-add-btn" onclick="openIlogModal()">＋ 取込記録を手動追加</button>';
  if(ilogLoadError) html += '<div class="ilog-empty" style="color:var(--over)">Notionから読み込めませんでした：'+ilogLoadError+'</div>';

  html += `<div class="ilog-filter-bar">
    <div class="ilog-filter-row">
      <input type="text" class="ilog-filter-input" id="ilogFilterSource"
        placeholder="🔍 口座・サービス名で絞り込み"
        value="${ilogFilter.source}"
        oninput="ilogFilter.source=this.value;renderImportLog()">
    </div>
    <div class="ilog-filter-row">
      <input type="date" class="ilog-filter-date"
        value="${ilogFilter.dateFrom}"
        onchange="ilogFilter.dateFrom=this.value;renderImportLog()">
      <span style="color:var(--sub);font-size:13px;flex-shrink:0">〜</span>
      <input type="date" class="ilog-filter-date"
        value="${ilogFilter.dateTo}"
        onchange="ilogFilter.dateTo=this.value;renderImportLog()">
      ${filterActive ? '<button class="ilog-filter-clear" onclick="ilogClearFilter()">✕ クリア</button>' : ''}
    </div>
  </div>`;

  html += `<div class="ilog-count">${filterActive ? filtered.length + ' / ' + allEntries.length : allEntries.length} 件</div>`;

  if(filtered.length === 0){
    html += '<div class="ilog-empty">' + (filterActive ? '条件に一致する記録がありません' : '取込記録がありません<br><span style="font-size:12px">📷ボタンで読み込むと自動記録されます</span>') + '</div>';
  } else {
    filtered.forEach(e => {
      const period = e.from && e.to ? e.from + ' 〜 ' + e.to
                   : e.from ? e.from + ' 〜' : e.to ? '〜 ' + e.to : '';
      const pendingBadge = e._pending ? '<span class="ilog-badge-pending">確認中</span>' : '';
      const txs = e.txSnapshot || [];
      const txCount = txs.length;
      const txListId = 'ilog-txlist-' + e.id;

      // 取引リストHTML
      let txRowsHtml = '';
      if(txCount > 0){
        txRowsHtml = txs.map(t =>
          `<div class="ilog-tx-row">
            <span class="ilog-tx-date">${t.date||''}</span>
            <span class="ilog-tx-name">${t.name||'（不明）'}</span>
            <span class="ilog-tx-cat">${t.category||''}</span>
            <span class="ilog-tx-amt">¥${(t.amount||0).toLocaleString()}</span>
          </div>`
        ).join('');
      }

      html += `<div class="ilog-card${e._pending?' ilog-pending':''}">
        <div class="ilog-card-head">
          <div>
            <div class="ilog-source">${e.source || '（口座未確定）'}${pendingBadge}</div>
            ${period ? `<div class="ilog-period">📅 ${period}</div>` : ''}
          </div>
          <div style="display:flex;gap:4px">
            <button class="ilog-del" onclick="editIlogEntry('${e.id}')" title="編集">✏️</button>
            <button class="ilog-del" onclick="deleteIlogEntry('${e.id}')" title="削除">🗑️</button>
          </div>
        </div>
        ${e.memo ? `<div class="ilog-memo">${e.memo}</div>` : ''}
        ${txCount > 0 ? `
        <button class="ilog-toggle-btn" onclick="ilogToggleTx('${txListId}', this)">
          ▶ 取込取引 ${txCount}件を見る
        </button>
        <div class="ilog-tx-list" id="${txListId}">
          ${txRowsHtml}
        </div>` : '<div style="font-size:12px;color:var(--sub);margin-top:6px">取引データなし</div>'}
      </div>`;
    });
  }
  html += '</div>';
  c.innerHTML = html;
}

    source,
    from: $('ilogFrom').value,
    to: $('ilogTo').value,

  };

    const cur = getIlogEntries().find(e=>e.id===ilogEditId);
    body.txSnapshot = cur ? cur.txSnapshot : [];
  }else{
    body.txSnapshot = [];
  }
  try{
    const r = await fetch(API + (editing ? "/importlog/update" : "/importlog/add"), {

async function submitBill(){
  const name = $("b-name").value.trim();
  if(!name){ toast("名前を入力してください", true); return; }
  const isEdit = !!editingBillId;
  const editId = editingBillId;
  const data = {
    name,
    day: parseInt($("b-day").value)||0,
    amount: parseInt($("b-amount").value)||0,
    type: $("b-type").value,

    enabled: $("b-enabled").checked,
  };

  // 楽観的更新（Notion確定を待たず即反映）

  if(isEdit){
    const idx = bills.findIndex(b=>b.id===editId);
    if(idx>=0){ bills[idx] = { ...bills[idx], ...data }; optimistic = bills[idx]; }
  }else{
    optimistic = { id:"temp-"+Date.now(), ...data };

  if(state.tab==="bills"||state.tab==="calendar") renderTab();
  toast(isEdit ? "更新中…" : "登録中…");

  try{

    if(isEdit) body.id = editId;
    const r = await fetch(API + (isEdit ? "/bill/update" : "/bill/add"), {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify(body)
    });
    const d = await r.json();
    if(!d.ok) throw new Error(d.error || "error");
    if(!isEdit && optimistic) optimistic.id = d.id; // 仮IDを本物に差し替え
    toast(isEdit ? "更新しました" : "登録しました");

    toast((isEdit?"更新":"登録")+"に失敗: "+e.message, true);

  }

// 全支払い：固定費DBの有効な支払い ＋ 口座DBに支払日があるカード。カレンダー・直近予定で使用
function allPaymentItems(){
  const cards = getCardAccounts()
    .filter(a => a.day > 0)
    .map(a => ({ id:"card:"+a.name, name:a.name, day:a.day, amount:0, type:"クレジットカード", account:a.name, _card:true }));
  return [...bills.filter(b=> b.enabled!==false), ...cards];
}
function upcomingBills(){
  const today = new Date(); today.setHours(0,0,0,0);
  const y = today.getFullYear(), m = today.getMonth();
  return allPaymentItems()
    .filter(b=>b.day>0)
    .map(b=>{
      let target = new Date(y, m, b.day);
      if(target < today) target = new Date(y, m+1, b.day);
      const diff = Math.round((target - today) / 86400000);
      return { ...b, target, diff };
    })
    .filter(b=>b.diff >= 0 && b.diff <= 14)
    .sort((a,b)=>a.diff-b.diff);
}

// ---- iOSカレンダーに登録（.ics）：毎月くり返し＋1日前アラート ----
function icsEscape(s){ return String(s||"").replace(/([,;\\])/g,"\\$1").replace(/\r?\n/g,"\\n"); }
function pad2(n){ return String(n).padStart(2,"0"); }
function icsDownload(name, day, amount){
  if(!day){ toast("支払日が未設定です", true); return; }
  const now = new Date();
  // 今月の該当日。過ぎていれば翌月から開始
  let start = new Date(now.getFullYear(), now.getMonth(), day, 9, 0, 0);
  if(start < now) start = new Date(now.getFullYear(), now.getMonth()+1, day, 9, 0, 0);
  const dt = start.getFullYear()+pad2(start.getMonth()+1)+pad2(start.getDate())
           +"T"+pad2(start.getHours())+pad2(start.getMinutes())+"00";
  const stamp = new Date().toISOString().replace(/[-:]/g,"").slice(0,15)+"Z";
  const uid = "lifelog-"+Date.now()+"-"+Math.random().toString(36).slice(2)+"@lifelog";
  const title = "💳 "+name+" 支払日"+(amount?" ¥"+Number(amount).toLocaleString():"");
  const ics = [
    "BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//LIFE LOG//JP//","CALSCALE:GREGORIAN",
    "BEGIN:VEVENT",
    "UID:"+uid,
    "DTSTAMP:"+stamp,
    "DTSTART:"+dt,
    "DURATION:PT30M",
    "RRULE:FREQ=MONTHLY;BYMONTHDAY="+day,
    "SUMMARY:"+icsEscape(title),
    "BEGIN:VALARM","ACTION:DISPLAY","DESCRIPTION:"+icsEscape(title),"TRIGGER:-P1D","END:VALARM",
    "END:VEVENT","END:VCALENDAR"
  ].join("\r\n");
  const blob = new Blob([ics], { type:"text/calendar;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = name.replace(/[\\/:*?"<>|]/g,"") + "_支払日.ics";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1500);
  toast("カレンダーファイルを作成しました");
}

      html += '<div class="ub-row"><span>'
        + billIcon(b.type)+" "+b.name
        + '<span class="ub-soon">'+label+'</span></span>'
        + '<span>'+(b.amount?'¥'+b.amount.toLocaleString():"--")+'</span></div>';

    cardAccounts.forEach(a=>{
      const dayLabel = a.day ? "毎月"+a.day+"日払い" : '<span style="color:var(--sub)">支払日 未設定</span>';
      html += '<div class="bill-card">'
        + '<div class="bill-icon">💳</div>'
        + '<div class="bill-info"><div class="bill-name">'+a.name+'</div>'
        + '<div class="bill-sub">'+dayLabel+'</div>'

        + '</div></div>'
        + '<div class="bill-right">'
        + '<div class="bill-day" style="color:var(--sub);font-size:11px">残高はNotionで管理</div>'
        + '</div></div>';
    });
  }

  // ── サブスク・固定費（種別ごと） ──
  BILL_TYPE_ORDER.forEach(type=>{
    const group = bills.filter(b=>b.type===type);
    if(!group.length) return;
    html += '<div class="bill-section-label">'+billIcon(type)+' '+type+'</div>';
    group.sort((a,b)=>(a.day||99)-(b.day||99)).forEach(b=>{
      const dayLabel = b.day ? "毎月"+b.day+"日" : "支払日未設定";
      const off = b.enabled===false;
      html += '<div class="bill-card'+(off?' bill-off':'')+'">'
        + '<div class="bill-icon">'+billIcon(b.type)+'</div>'
        + '<div class="bill-info"><div class="bill-name">'+b.name+(off?' <span style="font-size:10px;color:var(--sub)">(無効)</span>':'')+'</div>'
        + '<div class="bill-sub">'+dayLabel+(b.account?" · "+b.account:"")+(b.memo?" · "+b.memo:"")+'</div>'
        + '<div class="bill-actions">'
        + '<button class="bill-edit" data-id="'+b.id+'">✏️ 編集</button>'
        + (b.day?'<button class="bill-ics" data-name="'+(b.name||"").replace(/"/g,"&quot;")+'" data-day="'+b.day+'" data-amount="'+(b.amount||0)+'">📅</button>':'')
        + '<button class="bill-del" data-id="'+b.id+'">🗑</button>'
        + '</div></div>'
        + '<div class="bill-right">'
        + (b.amount?'<div class="bill-amt">¥'+b.amount.toLocaleString()+'</div>':'')
        + '<div class="bill-day">'+dayLabel+'</div>'

  c.innerHTML = html;

  });
  c.querySelectorAll(".bill-ics").forEach(btn=>{
    btn.onclick = (e)=>{ e.stopPropagation(); icsDownload(btn.dataset.name, parseInt(btn.dataset.day)||0, parseInt(btn.dataset.amount)||0); };
  });
}

let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth(); // 0-based
let calSelectedDay = null;

function renderCalendar(c){
  const today = new Date(); today.setHours(0,0,0,0);

  // 取引をday単位でまとめる
  const txByDay = {};
  const s = state.summary;
  if(s && s.transactions){
    s.transactions.forEach(t=>{
      if(!t.date) return;
      const d = t.date.slice(0,10);
      (txByDay[d] = txByDay[d]||[]).push(t);
    });
  }

  // 支払日をday単位でまとめる（クレカ含む全アイテム）
  const billsByDay = {};
  allPaymentItems().forEach(b=>{
    if(!b.day) return;
    const d = new Date(calYear, calMonth, b.day);
    if(d.getMonth()!==calMonth) return; // 月末オーバー（例:2月30日）
    const key = calYear+"-"+String(calMonth+1).padStart(2,"0")+"-"+String(b.day).padStart(2,"0");
    (billsByDay[key]=billsByDay[key]||[]).push(b);
  });

  const firstDay = new Date(calYear, calMonth, 1).getDay(); // 0=Sun
  const lastDate = new Date(calYear, calMonth+1, 0).getDate();
  const monthStr = calYear+"年"+(calMonth+1)+"月";

  let html = '<div class="cal-nav">'
    + '<button id="calPrev">‹</button>'
    + '<span class="cal-title">'+monthStr+'</span>'
    + '<button id="calNext">›</button></div>';

  html += '<div class="cal-grid">';
  ["日","月","火","水","木","金","土"].forEach(d=>{
    html += '<div class="cal-dow">'+d+'</div>';
  });

  // 前月の埋め
  const prevLast = new Date(calYear, calMonth, 0).getDate();
  for(let i=0;i<firstDay;i++){
    const day = prevLast - firstDay + 1 + i;
    html += '<div class="cal-cell other-month"><div class="cday">'+day+'</div></div>';
  }

  for(let d=1;d<=lastDate;d++){
    const key = calYear+"-"+String(calMonth+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
    const txs = txByDay[key]||[];
    const bls = billsByDay[key]||[];
    const isToday = (new Date(calYear,calMonth,d).getTime()===today.getTime());
    const isSelected = (calSelectedDay===key);
    // 立て替え・NMD・調節費用などは支出に数えない
    const dayTotal = txs.filter(t=> !(t.kind||"").includes("収入") && classifyLocal(t.kind, t.category)!=="ignore")
                        .reduce((s,t)=>s+t.amount,0);
    const hasNMD = txs.some(t=> isNMDCategory(t.category, t.kind));
    html += '<div class="cal-cell'+(isToday?" today":"")+(isSelected?" selected":"")+'" data-key="'+key+'">';
    html += '<div class="cday">'+d+'</div>';
    if(txs.length||bls.length){
      html += '<div class="cdots">';
      txs.slice(0,3).forEach(()=>{ html+='<span class="cdot-tx"></span>'; });
      bls.forEach(()=>{ html+='<span class="cdot-bill"></span>'; });
      html += '</div>';
      if(hasNMD) html += '<div class="ctotal" style="color:var(--green);font-weight:700">🎯NMD</div>';
      else if(dayTotal>0) html += '<div class="ctotal">'+Math.round(dayTotal/1000)+'k</div>';
    }
    html += '</div>';
  }

  // 次月の埋め
  const used = firstDay + lastDate;
  const remain = (7 - (used%7)) % 7;
  for(let i=1;i<=remain;i++){
    html += '<div class="cal-cell other-month"><div class="cday">'+i+'</div></div>';
  }
  html += '</div>'; // cal-grid

  // 選択日の詳細
  if(calSelectedDay){
    const txs = txByDay[calSelectedDay]||[];
    const bls = billsByDay[calSelectedDay]||[];
    if(txs.length||bls.length){
      html += '<div class="day-detail"><div class="dd-head">'+calSelectedDay.slice(5).replace("-","月")+'日</div>';
      txs.forEach(t=>{
        const inc = (t.kind||"").includes("収入");
        const nmd = isNMDCategory(t.category, t.kind);
        const amtHtml = nmd
          ? '<div class="dd-amt" style="color:var(--green)">🎯 NMD</div>'
          : '<div class="dd-amt" style="color:'+(inc?"var(--green)":"var(--red)")+'">'+(inc?"+":"−")+"¥"+t.amount.toLocaleString()+'</div>';
        html += '<div class="dd-row"><div><div>'+(t.memo||t.category||"（無題）")+'</div>'
          +'<div class="dd-cat">'+(t.category||"")+(t.subcategory?" > "+t.subcategory:"")+'</div></div>'
          +amtHtml+'</div>';
      });
      bls.forEach(b=>{
        html += '<div class="dd-row"><div><div>'+billIcon(b.type)+" "+b.name+'</div>'
          +'<div class="dd-cat">支払予定日'+(b.account?" · "+b.account:"")+'</div></div>'
          +'<div class="dd-amt dd-bill">'+(b.amount?"¥"+b.amount.toLocaleString():"金額未登録")+'</div></div>';
      });
      html += '</div>';
    }
  }

  c.innerHTML = html;

  c.querySelector("#calPrev").onclick = ()=>{
    calMonth--; if(calMonth<0){calMonth=11;calYear--;} calSelectedDay=null; renderTab();
  };
  c.querySelector("#calNext").onclick = ()=>{
    calMonth++; if(calMonth>11){calMonth=0;calYear++;} calSelectedDay=null; renderTab();
  };
  c.querySelectorAll(".cal-cell:not(.other-month)").forEach(cell=>{
    cell.onclick = ()=>{
      calSelectedDay = calSelectedDay===cell.dataset.key ? null : cell.dataset.key;
      renderTab();
    };
  });
}

// カレンダーの表示月を取引の会計月に合わせてリセット
function syncCalToMonth(){
  const [y,m] = state.month.split("-").map(Number);
  calYear = y; calMonth = m-1; calSelectedDay = null;
}

</script>
</body>
</html>
